y.sel{background:var(--primary);color:#fff}.day.today{outline:2px solid var(--primary2)}.list{display:flex;flex-direction:column;gap:10px}.record{background:var(--card2);border:1px solid var(--line);border-radius:18px;padding:12px}.record-top{display:flex;justify-content:space-between;gap:8px}.record small{color:var(--muted)}.tag{font-size:11px;background:#e1f3ef;color:var(--primary);border-radius:999px;padding:3px 7px;margin-left:6px}.del{color:var(--red);font-size:13px}.heat{display:grid;grid-template-columns:repeat(15,1fr);gap:4px}.sq{aspect-ratio:1;border-radius:5px;background:#dcefed}.sq.l1{background:#bfe4de}.sq.l2{background:#85c8bf}.sq.l3{background:#4d9d98}.stat-row{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:10px 0}.stat-row:last-child{border-bottom:0}.switch-row{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--line);background:rgba(255,255,255,.72);border-radius:16px;padding:8px 9px;margin:7px 0;box-shadow:0 4px 14px rgba(77,157,152,.05);overflow:hidden;position:relative;isolation:isolate}.switch-row:last-child{border-bottom:1px solid var(--line)}.row-main{min-width:0;flex:1 1 auto;display:flex;align-items:center;gap:8px;overflow:hidden;position:relative;z-index:1;pointer-events:none}.row-icon{width:28px;height:28px;border-radius:10px;background:#edf8f6;display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto}.row-text{min-width:0;flex:1;overflow:hidden}.row-title{font-weight:820;font-size:14px;line-height:1.16;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;word-break:normal}.row-sub{display:block;width:fit-content;max-width:100%;font-size:10px;color:var(--muted);margin-top:3px;line-height:1.12;background:#eef7f5;border:1px solid #d8eeea;border-radius:999px;padding:2px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none}.switch-row .row-actions{flex:0 0 auto;display:flex;align-items:center;justify-conte lor:var(--red);font-size:11px;border:1px solid #f0cdcd;border-radius:11px;padding:6px 7px;background:#fff8f8;flex:0 0 auto;position:relative;z-index:6}.switch-row select{font-size:12.5px;height:30px;line-height:30px;max-width:94px;padding:0 20px 0 7px}.sw{width:38px!important;height:22px!important;padding:2px!important;z-index:21!important}.sw i{width:18px!important;height:18px!important}.sw.on i{transform:translateX(16px)!important}.mini-del{font-size:11px!important;border-radius:10px!important;padding:5px 6px!important;z-index:21!important}.row-actions,.switch-row .row-actions{z-index:20!important}.row-actions>*,.switch-row .row-actions>*{z-index:21!important;position:relative}.modal{position:fixed;inset:0;background:rgba(35,55,52,.34);display:none;align-items:flex-end;z-index:40}.modal.show{display:flex}.sheet{width:100%;max-width:520px;margin:0 auto;background:var(--bg);border-radius:28px 28px 0 0;padding:18px 16px 26px;max-height:88dvh;overflow:auto}.sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.x{font-size:24px;color:var(--muted)}.field{margin:12px 0}.label{font-size:13px;color:var(--muted);margin-bottom:6px}.inp,textarea,select{width:100%;border:1px solid var(--line);background:var(--card2);border-radius:16px;padding:12px;outline:none}textarea{min-height:88px;resize:vertical}.btn{width:100%;background:var(--primary);color:#fff;border-radius:18px;padding:13px;font-weight:750;margin-top:10px}.btn2{background:var(--card);border:1px solid var(--line);color:var(--text)}.imgs{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.imgs img{width:70px;height:70px;object-fit:cover;border-radius:14px;border:1px solid var(--line)}.empty{color:var(--muted);text-align:center;padding:22px 0;font-size:13px;grid-column:1/-1}.hint{font-size:12px;color:var(--muted);line-height:1.6}.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#243331;color:white;padding:10px 14px;border-radius:999px;font-size:13px;d /* v2.13.1: theme surface/readability override */
.seg{background:transparent!important;}
.seg button{background:var(--card)!important;color:var(--text)!important;border-color:var(--line)!important;box-shadow:var(--shadow)!important;}

<div class="app">
<div class="top"><div><div class="title">Mkvocd <span style="font-size:11px;color:var(--muted)">v2.13.1</span></div><div class="sub" id="todayText"></div></div><div class="top-actions"><button class="pill" id="customBtn" type="button" onclick="openCustomPage(event)">自定义</button><button class="pill" onclick="backup()">导出</button></div></div>

<section id="custom" class="page"><div class="page-head"><button class="back-btn" onclick="goPageOnly('home')">‹ 返回首页</button><b>自定义组件</b><span></span></div><div class="panel"><div class="settings-head">我的自定义组件</div><div class="hint">这里只管理你自己新增的组件。系统原有组件请去「设置」页管理。</div><div id="customComponentSettings"></div></div><div class="panel" id="addComponentPanel"><div class="settings-head">新增自定义组件</div><div class="field"><div class="label">图标</div><input class="inp" id="newIcon" placeholder="比如 ☕" value="☕"></div><div class="field"><div class="label">名称</div><input class="inp" id="newName" placeholder="比如 喝咖啡"></div><div class="field"><div class="label">显示位置</div><select id="newMode"><option value="quick">仅 ★ 快速</option><option value="deep">仅 ＋ 添加</option><option value="both">两边都有</option></select></div><button class="btn" onclick="addComp()">添加组件</button></div></section>
</div>
<nav class="tabs"><button class="tab active" onclick="go('home',this)">首页</button><button class="tab" onclick="go('calendar',this)">日历</button><button class="tab" onclick="go('stats',this)">统计</button><button class="tab" onclick="go('settings',this)">设置</button></nav>

<script>
const STORE='make_times_local_v2';
const defaults=[{id:'movie',icon:'🎬',name:'观影',on:true,mode:'deep',builtin:true,fields:[['title','名称','text'],['kind','类型/平台','text'],['score','评分','number'],['note','短评','textarea']]},{id:'hairwash',icon:'🫧',name:'洗头',on:true,mode:'quick',builtin:true,fields:[['note','备注','textarea']]},{id:'haircut',icon:'✂️',name:'理发',on:true,mode:'both',builtin:true,fields:[['shop','店铺','text'],['price','价格','number'],['note','效果','textarea']]},{id:'rhinitis',icon:'🤧',name:'鼻炎',on:true,mode:'quick',builtin:true,fields:[['level','程度','select:轻微,中等,严重'],['medicine','用药','text'],['note','备注','textarea']]},{id:'sheet',icon:'🛏️',name:'换床单',on:true,mode:'quick',builtin:true,fields:[['note','备注','textarea']]},{id:'eatout',icon:'🍜',name:'外食',on:true,mode:'deep',builtin:true,fields:[['place','店名','text'],['food','吃了什么','text'],['price','价格','number'],['note','评价','textarea']]},{id:'game',icon:'🎮',name:'游戏',on:true,mode:'deep',builtin:true,fields:[['game','游戏名','text'],['duration','时长','number'],['note','记录','textarea']]},{id:'work',icon:'💻',name:'工作',on:true,mode:'both',builtin:true,fields:[['task','事项','text'],['duration','时长','number'],['note','备注','textarea']]},{id:'other',icon:'✨',name:'其他',on:true,mode:'both',builtin:true,fields:[['title','标题','text'],['note','备注','textarea']]}];
const THEME_STORE='mkvocd_theme';
const themes={
  default:{name:'默认蓝紫',bg:'#f3f1ff',card:'#ffffff',card2:'#fbfbff',text:'#25233a',muted:'#817d9a',line:'#ded9ff',primary:'#6C63FF',primary2:'#dcd8ff',accent:'#8f88ff',green:'#7fbf9e',red:'#d97878',shadow:'0 10px 28px rgba(108,99,255,.12)',body:'linear-gradient(180deg,#f0eeff 0%,#f7f6ff 48%,#f4fbff 100%)'},
  cream:{name:'奶油白',bg:'#fbf4e8',card:'#fffdf8',card2:'#fffaf1',text:'#3b3026',muted:'#9a8068',line:'#ead8bf',primary:'#C89B6D',primary2:'#f1dfc8',accent:'#d8b48a',green:'#86b88f',red:'#d98272',shadow:'0 10px 28px rgba(155,106,67,.12)',body:'linear-gradient(180deg,#fff7ea 0%,#fbf4e8 52%,#fffdf8 100%)'},
  sea:{name:'海盐蓝',bg:'#edf8ff',card:'#fbfdff',card2:'#ffffff',text:'#203446',muted:'#6f8fa5',line:'#cfe7f7',primary:'#3A8DDE',primary2:'#d6edff',accent:'#76b7e8',green:'#63bfa8',red:'#d97878',shadow:'0 10px 28px rgba(58,141,222,.12)',body:'linear-gradient(180deg,#e8f6ff 0%,#edf8ff 48%,#f7fcff 100%)'},
  mint:{name:'薄荷绿',bg:'#edf9f5',card:'#fbfffd',card2:'#ffffff',text:'#1f3833',muted:'#71948d',line:'#ccebe4',primary:'#38BFA7',primary2:'#cef3ec',accent:'#72d2c1',green:'#65bf86',red:'#d97878',shadow:'0 10px 28px rgba(56,191,167,.12)',body:'linear-gradient(180deg,#e8fbf7 0%,#edf9f5 50%,#f8fffc 100%)'},
  cherry:{name:'樱桃粉',bg:'#fff0f6',card:'#fffafd',card2:'#ffffff',text:'#3c2630',muted:'#a1788a',line:'#f2cfe0',primary:'#E85D8C',primary2:'#ffd8e7',accent:'#f08bae',green:'#7fbf9e',red:'#db6b74',shadow:'0 10px 28px rgba(232,93,140,.13)',body:'linear-gradient(180deg,#fff0f7 0%,#fff6fa 50%,#fffafd 100%)'},
  fox:{name:'狐狸红',bg:'#fff1eb',card:'#fffaf7',card2:'#ffffff',text:'#3f2b24',muted:'#a57a68',line:'#f1cfbf',primary:'#D94A2B',primary2:'#ffd9cc',accent:'#ef7a52',green:'#8fba7e',red:'#d94a2b',shadow:'0 10px 28px rgba(217,74,43,.13)',body:'linear-gradient(180deg,#fff0e8 0%,#fff6f1 50%,#fffaf7 100%)'},
  otter:{name:'水獭棕',bg:'#f5eee7',card:'#fffaf5',card2:'#fffdf9',text:'#352a22',muted:'#8d7765',line:'#e5d2bf',primary:'#9B6A43',primary2:'#ead8c8',accent:'#b88960',green:'#7fb48a',red:'#d47a69',shadow:'0 10px 28px rgba(105,73,48,.13)',body:'linear-gradient(180deg,#f7eee5 0%,#f5eee7 52%,#fffaf5 100%)'},
  raven:{name:'渡鸦黑',bg:'#151a20',card:'#20262d',card2:'#252c34',text:'#edf1f5',muted:'#a3adb8',line:'#343c46',primary:'#5E6A75',primary2:'#36404a',accent:'#8a96a3',green:'#7fbf9e',red:'#d98282',shadow:'0 10px 28px rgba(0,0,0,.28)',body:'linear-gradient(180deg,#11161b 0%,#151a20 52%,#1c2229 100%)'},
  night:{name:'暗夜黑',bg:'#10111d',card:'#1b1c2b',card2:'#222337',text:'#f0efff',muted:'#aaa8c8',line:'#333451',primary:'#8B8CFF',primary2:'#34356f',accent:'#a8a9ff',green:'#7fc7aa',red:'#e0838e',shadow:'0 10px 28px rgba(0,0,0,.32)',body:'linear-gradient(180deg,#0e1020 0%,#121426 54%,#191a2e 100%)'}
};
function applyTheme(key){let t=themes[key]||themes.default,root=document.documentElement;['bg','card','card2','text','muted','line','primary','primary2','accent','green','red','shadow'].forEach(k=>root.style.setProperty('--'+k,t[k]));document.body.style.background=t.body}
function setTheme(key){if(!themes[key])key='default';localStorage.setItem(THEME_STORE,key);applyTheme(key);let sel=document.getElementById('themeSelect');if(sel)sel.value=key;toast('主题已切换：'+themes[key].name)}
function initThemeSelect(){let sel=document.getElementById('themeSelect');if(sel)sel.value=localStorage.getItem(THEME_STORE)||'default'}

let db=load(),currentMonth=new Date(),selected=fmt(new Date()),editingType=null,images=[],homeMode=localStorage.getItem('make_times_home_mode')||'quick';migrate();
function clone(x){return JSON.parse(JSON.stringify(x))}function load(){let x=localStorage.getItem(STORE);if(x)return JSON.parse(x);return{components:clone(defaults),records:[]}}function migrate(){let changed=false;if(!db.components)db.components=[];defaults.forEach(d=>{let c=db.components.find(x=>x.id===d.id);if(!c){db.components.push(clone(d));changed=true}else{['icon','name','on','fields','builtin'].forEach(k=>{if(c[k]===undefined){c[k]=clone(d[k]);changed=true}});if(!c.mode){c.mode=d.mode||'both';changed=true}}});if(!db.records)db.records=[];db.records.forEach(r=>{if(!r.recordMode){r.recordMode=Object.keys(r.data||{}).some(k=>r.data[k])||(r.images||[]).length?'deep':'quick';changed=true}});if(changed)saveRaw()}function saveRaw(){localStorage.setItem(STORE,JSON.stringify(db))}function save(){saveRaw();renderAll()}function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function parse(s){let[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}function comp(id){return db.components.find(c=>c.id===id)||defaults.find(c=>c.id===id)}function toast(t){let el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1400)}function dateText(){let d=new Date();todayText.textContent=d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}function setHomeMode(m){homeMode=m;localStorage.setItem('make_times_home_mode',m);quickSeg.classList.toggle('active',m==='quick');deepSeg.classList.toggle('active',m==='deep');renderCards()}function nowTime(){let d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}function recTime(r){if(r.time)return r.time;if(r.createdAt){let d=new Date(r.createdAt);if(!isNaN(d))return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}return''}let dragCompId=null,dragTimer=null,dragStarted=false,dragPointerId=null,dragOverId=null,dragSourceEl=null,dragGhost=null,dragOffsetX=0,dragOffsetY=0,dragStartX=0,dragStartY=0,dragArmed=false;
function clearDragUI(){document.querySelectorAll('.card.dragging,.card.drop-target').forEach(x=>x.classList.remove('dragging','drop-target'));if(dragGhost){dragGhost.remove();dragGhost=null}}
function dragTargetFromPoint(x,y){let hidden=null;if(dragSourceEl){hidden=dragSourceEl;hidden.style.visibility='hidden'}let el=document.elementFromPoint(x,y);if(hidden)hidden.style.visibility='';let card=el&&el.closest?el.closest('.card[data-comp-id]'):null;return card?card.dataset.compId:null}
function markDropTarget(id){document.querySelectorAll('.card.drop-target').forEach(x=>x.classList.remove('drop-target'));if(id&&id!==dragCompId){let el=document.querySelector(`.card[data-comp-id="${id}"]`);if(el)el.classList.add('drop-target')}}
function moveGhost(x,y){if(!dragGhost)return;dragGhost.style.transform=`translate3d(${x-dragOffsetX}px,${y-dragOffsetY}px,0) scale(1.03)`}
function startCardDrag(id,e){if(!dragArmed||!dragSourceEl)return;dragCompId=id;dragStarted=true;let r=dragSourceEl.getBoundingClientRect();dragOffsetX=e.clientX-r.left;dragOffsetY=e.clientY-r.top;dragGhost=dragSourceEl.cloneNode(true);dragGhost.classList.add('drag-ghost');dragGhost.style.width=r.width+'px';dragGhost.style.height=r.height+'px';document.body.appendChild(dragGhost);dragSourceEl.classList.add('dragging');try{dragSourceEl.setPointerCapture(dragPointerId)}catch(_){}moveGhost(e.clientX,e.clientY);if(navigator.vibrate)navigator.vibrate(25);toast('已进入排序，拖到目标后松手')}
function cardDown(id,e){if(e.button!==undefined&&e.button!==0)return;dragStarted=false;dragCompId=null;dragOverId=null;dragPointerId=e.pointerId;dragSourceEl=e.currentTarget;dragStartX=e.clientX;dragStartY=e.clientY;dragArmed=true;clearTimeout(dragTimer);dragTimer=setTimeout(()=>startCardDrag(id,e),520)}
function cardMove(id,e){if(!dragSourceEl)return;let dx=e.clientX-dragStartX,dy=e.clientY-dragStartY,dist=Math.hypot(dx,dy);if(!dragStarted){if(dist>10){clearTimeout(dragTimer);dragArmed=false;dragSourceEl=null}return}moveGhost(e.clientX,e.clientY);let target=dragTargetFromPoint(e.clientX,e.clientY);dragOverId=target;markDropTarget(target);e.preventDefault()}
function cardUp(id,e){clearTimeout(dragTimer);dragArmed=false;let target=dragStarted?dragTargetFromPoint(e.clientX,e.clientY):null;target=target||dragOverId;let source=dragCompId;clearDragUI();try{dragSourceEl&&dragSourceEl.releasePointerCapture&&dragSourceEl.releasePointerCapture(dragPointerId)}catch(_){}dragSourceEl=null;if(dragStarted&&source&&target&&target!==source){let from=db.components.findIndex(c=>c.id===source),to=db.components.findIndex(c=>c.id===target);if(from>-1&&to>-1){let [it]=db.components.splice(from,1);db.components.splice(to,0,it);save();toast('首页顺序已调整');dragCompId=null;dragOverId=null;setTimeout(()=>dragStarted=false,0);return}}dragCompId=null;dragOverId=null;setTimeout(()=>dragStarted=false,0)}
function cardCancel(){clearTimeout(dragTimer);dragArmed=false;clearDragUI();dragCompId=null;dragOverId=null;dragSourceEl=null;setTimeout(()=>dragStarted=false,0)}function lastText(id){let rs=db.records.filter(r=>r.type===id).sort((a,b)=>b.date.localeCompare(a.date));if(!rs.length)return'还没有记录';let diff=Math.floor((parse(fmt(new Date()))-parse(rs[0].date))/86400000);return diff===0?'今天':diff===1?'昨天':diff+' 天前'}function quick(id,e){if(e)e.stopPropagation();db.records.push({id:Date.now()+Math.random(),type:id,date:fmt(new Date()),recordMode:'quick',time:nowTime(),data:{},images:[],createdAt:new Date().toISOString()});save();toast('★ 快速记录好了')}function shouldShow(c,area){return c.on&&(c.mode===area||c.mode==='both')}
function renderCards(){quickSeg.classList.toggle('active',homeMode==='quick');deepSeg.classList.toggle('active',homeMode==='deep');homeNote.textContent=homeMode==='quick'?'★ 快速：点一下卡片，今天就记上。':'＋ 添加：写字段、备注、图片，记录更完整。';homeCards.innerHTML='';let list=db.components.filter(c=>shouldShow(c,homeMode));list.forEach(c=>{let div=document.createElement('div');div.className='card';div.dataset.compId=c.id;div.onpointerdown=(e)=>cardDown(c.id,e);div.onpointermove=(e)=>cardMove(c.id,e);div.onpointerup=(e)=>cardUp(c.id,e);div.onpointercancel=cardCancel;div.onpointerleave=(e)=>{if(!dragStarted)cardCancel()};if(homeMode==='quick'){div.onclick=(e)=>{if(dragStarted){dragStarted=false;e.preventDefault();return}quick(c.id,e)};div.innerHTML=`<button class="deep-mark" onclick="quick('${c.id}',event)">★</button><div class="icon">${c.icon}</div><div class="name">${c.name}</div><div class="meta">上次：${lastText(c.id)}<br>一键快速打点</div>`}else{div.onclick=(e)=>{if(dragStarted){dragStarted=false;e.preventDefault();return}openModal(c.id)};div.innerHTML=`<div class="plus">+</div><div class="icon">${c.icon}</div><div class="name">${c.name}</div><div class="meta">上次：${lastText(c.id)}<br>添加详情和图片</div>`}homeCards.appendChild(div)});if(!homeCards.innerHTML)homeCards.innerHTML='<div class="empty">这个分区还没有组件，点右上角「自定义」添加或调整。</div>'}
function openModal(id,rec=null){editingType=id;images=rec?.images?[...rec.images]:[];let c=comp(id);modalTitle.textContent=c.icon+' '+c.name;let html=`<div class="field"><div class="label">日期</div><input class="inp" id="f_date" type="date" value="${rec?.date||fmt(new Date())}"></div><div class="field"><div class="label">时间</div><input class="inp" id="f_time" type="time" value="${rec?.time||nowTime()}"></div>`;c.fields.forEach(f=>{let v=rec?.data?.[f[0]]||'';html+=`<div class="field"><div class="label">${f[1]}</div>${inputHtml(f,v)}</div>`});html+=`<div class="field"><div class="label">图片 / 截图，最多 6 张</div><input class="inp" type="file" accept="image/*" multiple onchange="pickImgs(this)"><div class="imgs" id="imgPreview"></div></div><button class="btn" onclick="submitRec()">保存 ＋ 添加记录</button><button class="btn btn2" onclick="closeModal()">取消</button>`;form.innerHTML=html;previewImgs();modal.classList.add('show')}function inputHtml(f,v){let[key,label,type]=f;if(type==='textarea')return`<textarea id="f_${key}">${v}</textarea>`;if(type.startsWith('select:'))return`<select id="f_${key}">${type.slice(7).split(',').map(o=>`<option ${o===v?'selected':''}>${o}</option>`).join('')}</select>`;return`<input class="inp" id="f_${key}" type="${type}" value="${v}">`}function pickImgs(inp){[...inp.files].slice(0,6-images.length).forEach(file=>{let rd=new FileReader();rd.onload=()=>{images.push(rd.result);previewImgs()};rd.readAsDataURL(file)})}function previewImgs(){let p=document.getElementById('imgPreview');if(!p)return;p.innerHTML=images.map((src,i)=>`<img src="${src}" onclick="images.splice(${i},1);previewImgs()">`).join('')}function submitRec(){let c=comp(editingType),data={};c.fields.forEach(f=>data[f[0]]=document.getElementById('f_'+f[0]).value);db.records.push({id:Date.now()+Math.random(),type:editingType,date:f_date.value,time:f_time.value,recordMode:'deep',data,images,createdAt:new Date().toISOString()});closeModal();save();toast('＋ 添加记录保存好了')}function closeModal(){modal.classList.remove('show')}
function go(id,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderAll()}function moveMonth(n){currentMonth.setMonth(currentMonth.getMonth()+n);renderCal()}function renderCal(){let y=currentMonth.getFullYear(),m=currentMonth.getMonth();monthTitle.textContent=y+' 年 '+(m+1)+' 月';let first=new Date(y,m,1),start=first.getDay(),days=new Date(y,m+1,0).getDate();cal.innerHTML=['日','一','二','三','四','五','六'].map(x=>`<div class="dow">${x}</div>`).join('');for(let i=0;i<start;i++)cal.innerHTML+='<div></div>';for(let d=1;d<=days;d++){let s=fmt(new Date(y,m,d)),has=db.records.some(r=>r.date===s),cls='day '+(has?'has ':'')+(s===selected?'sel ':'')+(s===fmt(new Date())?'today ':'');cal.innerHTML+=`<button class="${cls}" onclick="selected='${s}';renderCal();renderDayList()">${d}</button>`}renderDayList()}function renderDayList(){selTitle.textContent=selected+' 的记录';let rs=db.records.filter(r=>r.date===selected);dayList.innerHTML=rs.length?'':'<div class="empty">这天还没有记录</div>';rs.forEach(r=>{let c=comp(r.type)||{icon:'?',name:r.type};let fields=Object.entries(r.data||{}).filter(x=>x[1]).map(x=>`<small>${x[1]}</small>`).join('<br>');dayList.innerHTML+=`<div class="record"><div class="record-top"><b>${c.icon} ${c.name}<span class="tag">${r.recordMode==='deep'?'＋':'★'}</span></b><span><small>${recTime(r)}</small> <button class="del" onclick="delRec('${r.id}')">删除</button></span></div>${fields||'<small>★ 快速记录</small>'}<div class="imgs">${(r.images||[]).map(i=>`<img src="${i}">`).join('')}</div></div>`})}function delRec(id){db.records=db.records.filter(r=>String(r.id)!==String(id));save();toast('已删除')}
function renderStats(){let recent=[];for(let i=89;i>=0;i--){let d=new Date();d.setDate(d.getDate()-i);let s=fmt(d),n=db.records.filter(r=>r.date===s).length;recent.push(`<div class="sq ${n>2?'l3':n>1?'l2':n>0?'l1':''}" title="${s}: ${n}"></div>`)}heat.innerHTML=recent.join('');let counts={};db.records.forEach(r=>counts[r.type]=(counts[r.type]||0)+1);statList.innerHTML=db.components.map(c=>`<div class="stat-row"><span>${c.icon} ${c.name}</span><b>${counts[c.id]||0}</b></div>`).join('')||'<div class="empty">暂无统计</div>'}
function toggleComp(id){
  let c=comp(id);
  if(!c)return;
  c.on=!c.on;
  save();
  renderAll();
  toast(c.on?'已开启':'已关闭');
}
function modeLabel(m){return m==='quick'?'快速':m==='deep'?'仔细':'都有'}
function compRow(c){return `<div class="switch-row"><div class="row-main"><div class="row-icon">${c.icon}</div><div class="row-text"><div class="row-title">${c.name}</div><div class="row-sub">${c.on?'已开启':'已关闭'} · ${modeLabel(c.mode||'both')}</div></div></div><div class="row-actions" onclick="event.stopPropagation()" onpointerdown="event.stopPropagation()" ontouchstart="event.stopPropagation()"><select onclick="event.stopPropagation()" onpointerdown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onchange="setMode('${c.id}',this.value)"><option value="quick" ${c.mode==='quick'?'selected':''}>快速</option><option value="deep" ${c.mode==='deep'?'selected':''}>仔细</option><option value="both" ${c.mode==='both'?'selected':''}>都有</option></select><button type="button" class="sw ${c.on?'on':''}" onclick="event.preventDefault();event.stopPropagation();toggleComp('${c.id}')" onpointerdown="event.stopPropagation()" ontouchstart="event.stopPropagation()"><i></i></button><button type="button" class="mini-del" onclick="event.stopPropagation();deleteComp('${c.id}')" onpointerdown="event.stopPropagation()" ontouchstart="event.stopPropagation()">删</button></div></div>`}
function settingsGroupHTML(list,emptyText){
  if(!list.length)return '<div class="empty">'+emptyText+'</div>';
  let groups=[
    ['quick','★ 快速','点一下卡片，今天就记上。'],
    ['deep','＋ 仔细','填写字段、备注、图片。'],
    ['both','◎ 两边都有','快速和仔细都会显示。']
  ];
  return groups.map(g=>{
    let arr=list.filter(c=>(c.mode||'both')===g[0]);
    if(!arr.length)return '';
    return '<div class="settings-group"><div class="settings-group-title"><span>'+g[1]+'</span><small>'+g[2]+'</small></div>'+arr.map(compRow).join('')+'</div>';
  }).join('') || '<div class="empty">'+emptyText+'</div>';
}
function renderSettings(){
  initThemeSelect();
  let box=document.getElementById('componentSettings');
  if(!box)return;
  let list=db.components.filter(c=>c.builtin);
  box.innerHTML=settingsGroupHTML(list,'没有原有组件');
  let customBox=document.getElementById('customComponentSettings');
  if(customBox){
    let custom=db.components.filter(c=>!c.builtin);
    customBox.innerHTML=settingsGroupHTML(custom,'还没有自定义组件，下面可以新增。');
  }
}
function addComponent(){let name=newName.value.trim();if(!name){toast('先写名称');return}let icon=(newIcon.value.trim()||'✨').slice(0,2);db.components.push({id:'custom_'+Date.now(),icon,name,on:true,mode:newMode.value,builtin:false,fields:[['title','标题','text'],['note','备注','textarea']]});newName.value='';toast('已添加组件');save()}function goPageOnly(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));if(id==='home')document.querySelectorAll('.tab')[0].classList.add('active');if(id==='calendar')document.querySelectorAll('.tab')[1].classList.add('active');if(id==='stats')document.querySelectorAll('.tab')[2].classList.add('active');if(id==='settings')document.querySelectorAll('.tab')[3].classList.add('active');renderAll()}function openCustomPage(e){if(e){e.preventDefault();e.stopPropagation()}goPageOnly('custom');setTimeout(()=>{document.getElementById('newName')?.focus()},80)}function deleteComp(id){let c=comp(id);if(!c)return;let count=db.records.filter(r=>r.type===id).length;let msg=count?`删除「${c.name}」组件？
关联记录：${count} 条。
记录会保留在日历里，但统计/首页不再显示该组件。`:`删除「${c.name}」组件？`;if(confirm(msg)){db.components=db.components.filter(x=>x.id!==id);save();toast('组件已删除')}}function backup(){let blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='mkvocd-backup.json';a.click();URL.revokeObjectURL(a.href)}function renderAll(){dateText();renderCards();renderCal();renderStats();renderSettings()}renderAll();

window.addEventListener('DOMContentLoaded',()=>{let b=document.getElementById('customBtn');if(b){b.onclick=(e)=>openCustomPage(e)}});
